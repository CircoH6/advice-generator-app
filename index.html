<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Advice generator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="advice_container">
    <p id="advice_id" class="advice_id">ADVICE #<!-- Advice ID goes here --></p>
    <p id="advice_text" class="advice_text">"<!-- Advice text goes here -->"</p>
    <div class="advice_divider"><img src="images\pattern-divider-desktop.svg" alt=""></div>
    <button class="advice_dice"><img src="images\icon-dice.svg" alt=""></button>
  </div>
<script src="script.js"></script>
</body>
</html>
